<html lang="en-US" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Unofficial SFP Wizard Tool</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./style.css">

    <meta name="author" content="Jan Heil">
    <meta name="publisher" content="Jan Heil">
    <meta name="copyright" content="Jan Heil">
    <meta name="description" content="This tool allows you to program SFP modules via your browser.
The tool connects to your SFP Wizard using the Web Bluetooth API.">
    <meta name="keywords"
          content="Wizard, SFP, SFP+, SFP28, QSFP+, QSFP28, Tool, Client, App, UniFi, Ubiquiti, Bluetooth, BLE, Fibre, Module, Programmer, Flasher, Webinterface, TypeScript, JavaScript, HTML, CSS, JS, Repository">
    <meta name="page-topic" content="Verwaltung">
    <meta name="page-type" content="Software Download">
    <meta name="audience" content="Profis">
    <meta http-equiv="content-language" content="de">
    <meta name="robots" content="index, follow">

</head>
<body>

<main class="flex-grow-1">
    <!-- Start: Container -->
    <div class="container" id="page-container">
        <div class="hero">
            <br>
            <h1>Unofficial SFP Wizard Tool</h1>
            <p id="page-info"></p>
            <b id="page-affiliate"></b>
            <br>
            <br>
        </div>

        <div class="row align-items-start">
            <div class="col-12 col-sm-4">
                <!-- Start: Device Card -->
                <div class="card">
                    <a target="_blank"
                       href="https://eu.store.ui.com/eu/en/category/accessories-sfp-liberation-day/collections/accessories-pro-direct-attach-cables/products/uacc-sfp-wizard">
                        <img style="padding: 1.5rem" class="card-img-top" alt="UniFi SFP Wizard"
                             src="https://images.svc.ui.com/?u=https%3A%2F%2Fcdn.ecomm.ui.com%2Fproducts%2Fc173c693-c05c-4d8a-ba86-e544fbe42633%2Fa07eba13-9222-4789-bb1d-20e58048a31f.png&q=75&w=3840">
                    </a>

                    <div class="card-body">
                        <!-- Start: Device Info -->
                        <div id="device-info">
                            <p><b id="page-name">Name:</b> <span id="device-name"></span></p>
                            <p><b id="page-serial">Serial:</b> <span id="device-serial"></span></p>
                            <p><b id="page-firmware">Firmware:</b> <span id="device-firmware"></span></p>
                            <p><b id="page-battery">Battery:</b> <span id="device-battery"></span></p>
                        </div>
                        <!-- End: Device Info -->

                        <!-- Start: Device Connect -->
                        <div class="btn-group needConnected">
                            <button type="button" id="connect-wizard" class="btn btn-primary ignoreConnect">Connect
                            </button>
                            <button type="button" id="poweroff-wizard" disabled class="btn btn-danger">Shutdown</button>
                            <button type="button" id="reboot-wizard" disabled class="btn btn-danger">Reboot</button>
                        </div>
                        <!-- End: Device Connect -->
                    </div>
                </div>
                <!-- End: Device Card -->
            </div>

            <div class="col-12 col-sm-8">
                <!-- Start: Device Controls -->
                <div class="card">
                    <div class="card-body">
                        <!-- Start: Wizard Controls -->
                        <div id="wizard-controls">
                            <!-- EOL -->
                        </div>
                        <!-- End: Wizard Controls -->
                        <br>
                        <div class="card">
                            <div class="card-body">
                                <!-- Start: SFP Flash -->
                                <div id="sfp-flash">
                                    <h5 class="card-title">Module Flash</h5>
                                    <!-- Start: EEPROM Config Upload -->
                                    <div class="mb-3">
                                        <label for="sfp-file" class="form-label">EEPROM Configuration</label>
                                        <input class="form-control" disabled type="file" accept=".uieeprom"
                                               id="sfp-file">
                                    </div>
                                    <!-- End: EEPROM Config Upload -->

                                    <!-- Start: Repo EEPROM Config Select -->
                                    <div class="mb-3">
                                        <label for="sfp-repo" class="form-label">EEPROM Repository</label>
                                        <select class="form-select" id="sfp-repo" disabled
                                                aria-label="Default select example">
                                            <option selected>Select EEPROM Config</option>
                                            <option value="1">Todo</option>
                                        </select>
                                    </div>
                                    <!-- End: Repo EEPROM Config Select -->
                                </div>
                                <!-- End: SFP Flash -->

                                <div class="btn-group needConnected" role="group">
                                    <button type="button" id="write-sfp" disabled class="btn btn-primary">Write SFP
                                    </button>
                                    <button type="button" id="save-sfp" disabled class="btn btn-primary">Save SFP
                                    </button>
                                </div>
                            </div>
                        </div>
                        <br>
                        <div class="card">
                            <div class="card-body">
                                <!-- Start: SFP Module -->
                                <div id="wizard-module">
                                    <h5 class="card-title">Module Meta</h5>
                                    <p class="card-text pb-3" id="page-module-meta"></p>
                                    <p><b id="page-sfp-part">Part:</b> <span id="sfp-part"></span></p>
                                    <p><b id="page-sfp-rev">Rev:</b> <span id="sfp-rev"></span></p>
                                    <p><b id="page-sfp-vendor">Vendor:</b> <span id="sfp-vendor"></span></p>
                                    <p><b id="page-sfp-serial">Serial:</b> <span id="sfp-sn"></span></p>
                                    <p><b id="page-sfp-type">Type:</b> <span id="sfp-type"></span></p>
                                    <p><b id="page-sfp-compliance">Compliance:</b> <span id="sfp-compliance"></span></p>

                                    <div class="btn-group needConnected">
                                        <button type="button" id="read-sfp" disabled
                                                class="btn btn-primary needConnected">Read SFP
                                        </button>
                                    </div>
                                </div>
                                <!-- End: SFP Module -->
                            </div>
                        </div>
                        <br>
                        <div class="card">
                            <div class="card-body">
                                <!-- Start: Wizard Log -->
                                <div id="wizard-log">
                                    <h5 class="card-title">Wizard Log</h5>

                                    <div id="log-container">

                                    </div>

                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="autoscroll" checked>
                                        <label class="form-check-label" id="autoscroll-label" for="autoscroll">Autoscroll
                                            Log</label>
                                    </div>
                                </div>
                                <!-- End: Wizard Log -->
                            </div>
                        </div>
                        <br>
                        <div class="card">
                            <div class="card-body">
                                <!-- Start: Wizard More -->
                                <div id="wizard-more">
                                    <h5 class="card-title">More</h5>

                                    <div class="btn-group needConnected">
                                        <button type="button" id="charge-wizard" disabled class="btn btn-warning">Charge
                                            Control
                                        </button>
                                        <button type="button" id="name-wizard" disabled class="btn btn-success">Change
                                            Name
                                        </button>
                                        <button type="button" id="log-wizard" disabled class="btn btn-primary">Internal Logs
                                        </button>
                                    </div>
                                </div>
                                <!-- End: Wizard More -->
                            </div>
                        </div>
                    </div>
                </div>
                <!-- End: Device Controls -->
            </div>
        </div>

    </div>
    <!-- End: Container -->
</main>
<br><br>

<footer class="py-3 mt-auto">

            Community</a></li>
